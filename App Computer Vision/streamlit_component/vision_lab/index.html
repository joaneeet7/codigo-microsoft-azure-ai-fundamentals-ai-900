<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style id="vision-css"></style>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        color: #172033;
        background: transparent;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const defaultSelectedFeatures = ["caption", "denseCaptions", "tags", "objects", "read", "people"];
      const featureOptions = [
        { id: "caption", label: "Caption" },
        { id: "denseCaptions", label: "Dense" },
        { id: "tags", label: "Tags" },
        { id: "objects", label: "Objects" },
        { id: "read", label: "OCR" },
        { id: "people", label: "People" },
        { id: "smartCrops", label: "Crops" }
      ];

      let args = {};
      let selectedFeatures = [...defaultSelectedFeatures];
      let currentFile = null;
      let currentDataUrl = "";
      let isAnalyzing = false;
      let lastIncomingFeatures = "";

      function sendMessage(type, data) {
        window.parent.postMessage({ isStreamlitMessage: true, type, ...data }, "*");
      }

      function setFrameHeight() {
        window.requestAnimationFrame(() => {
          sendMessage("streamlit:setFrameHeight", { height: document.documentElement.scrollHeight });
        });
      }

      function setComponentValue(value) {
        sendMessage("streamlit:setComponentValue", { value });
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function icon(name, size = 18, className = "") {
        const paths = {
          alert: '<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>',
          boxes: '<path d="m7.5 4.3 4.5 2.6 4.5-2.6"/><path d="M3 8.4 12 13l9-4.6"/><path d="M12 22V13"/><path d="m3 8.4 9-5.2 9 5.2v7.2l-9 5.2-9-5.2Z"/>',
          image: '<rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/>',
          upload: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m17 8-5-5-5 5"/><path d="M12 3v12"/>',
          scan: '<path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><circle cx="12" cy="12" r="3"/><path d="M7 12s2-5 5-5 5 5 5 5-2 5-5 5-5-5-5-5Z"/>',
          spark: '<path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/>',
          tags: '<path d="M12.6 2.6a2 2 0 0 0-1.4-.6H4a2 2 0 0 0-2 2v7.2a2 2 0 0 0 .6 1.4l8.8 8.8a2 2 0 0 0 2.8 0l7.2-7.2a2 2 0 0 0 0-2.8Z"/><circle cx="7.5" cy="7.5" r=".5"/>',
          type: '<polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/>',
          users: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.9"/><path d="M16 3.1a4 4 0 0 1 0 7.8"/>'
        };
        return `<svg class="${className}" xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${paths[name]}</svg>`;
      }

      function fileSizeLabel(bytes) {
        return bytes ? `${Math.max(1, Math.round(bytes / 1024))} KB` : "Sin imagen";
      }

      function resultCard(iconName, title, value) {
        return `<article class="result-card"><span>${icon(iconName)}</span><div><strong>${escapeHtml(title)}</strong><p>${escapeHtml(value)}</p></div></article>`;
      }

      function detailSection(title, items, empty, iconName) {
        const body = items && items.length ? items.map((item) => `<p>${escapeHtml(item)}</p>`).join("") : `<p>${escapeHtml(empty)}</p>`;
        return `<section class="detail-section"><h3>${iconName ? icon(iconName, 16) : ""}${escapeHtml(title)}</h3>${body}</section>`;
      }

      function render() {
        document.getElementById("vision-css").textContent = args.css || "";
        const incomingFeatures = Array.isArray(args.selectedFeatures) && args.selectedFeatures.length
          ? args.selectedFeatures.join(",")
          : "";
        if (incomingFeatures && incomingFeatures !== lastIncomingFeatures) {
          selectedFeatures = [...args.selectedFeatures];
          lastIncomingFeatures = incomingFeatures;
        }
        currentDataUrl = currentDataUrl || args.previewDataUrl || "";

        const configured = Boolean(args.configured);
        const result = args.result;
        const summary = result?.summary || {};
        const error = args.error || "";
        const fileName = currentFile?.name || args.fileName || "PNG, JPG, WEBP, BMP o GIF";
        const byteCount = currentFile?.size || args.bytes || 0;
        const modeText = result ? `${result.mode} - ${result.features.join(", ")}` : "El analisis aparecera aqui.";
        const raw = result ? JSON.stringify(result.raw, null, 2) : "";

        document.getElementById("root").innerHTML = `
          <main class="app-shell">
            <section class="layout">
              <aside class="side-panel">
                <div>
                  <div class="brand-mark" aria-hidden="true">${icon("scan", 30)}</div>
                  <p class="eyebrow">Azure AI Vision</p>
                  <h1>App Vision</h1>
                  <p class="intro">Analiza imagenes con caption, etiquetas, objetos, OCR, personas y recortes inteligentes.</p>
                </div>
                <div class="status-box">
                  <span class="${configured ? "status-dot ready" : "status-dot"}"></span>
                  <div>
                    <strong>${configured ? "Vision conectado" : "Modo demo local"}</strong>
                    <p>${configured ? `API ${escapeHtml(args.apiVersion || "2024-02-01")}` : "Configura VISION_ENDPOINT y VISION_KEY."}</p>
                  </div>
                </div>
              </aside>
              <section class="workbench">
                <form class="input-panel" id="vision-form">
                  <div class="section-title">
                    ${icon("upload", 20)}
                    <div>
                      <h2>Entrada visual</h2>
                      <p>Sube una imagen y elige las capacidades de analisis.</p>
                    </div>
                  </div>
                  <label class="${currentDataUrl ? "drop-zone has-image" : "drop-zone"}">
                    <input id="image-input" type="file" accept="image/png,image/jpeg,image/webp,image/bmp,image/gif" />
                    ${currentDataUrl ? `<img src="${currentDataUrl}" alt="Vista previa" />` : `<span>${icon("image", 34)}Seleccionar imagen</span>`}
                  </label>
                  <div class="meta-row">
                    <span>${icon("image", 16)} ${escapeHtml(fileName)}</span>
                    <span>${escapeHtml(fileSizeLabel(byteCount))}</span>
                  </div>
                  <div class="feature-grid">
                    ${featureOptions.map((feature) => `<button type="button" data-feature="${feature.id}" class="${selectedFeatures.includes(feature.id) ? "feature-chip active" : "feature-chip"}">${feature.label}</button>`).join("")}
                  </div>
                  <button class="primary-action" type="submit" ${currentDataUrl && !isAnalyzing ? "" : "disabled"}>
                    ${isAnalyzing ? icon("spark", 18, "spin") : icon("spark", 18)}
                    ${isAnalyzing ? "Analizando imagen" : "Analizar imagen"}
                  </button>
                </form>
                <section class="result-panel">
                  <div class="section-title">
                    ${icon("scan", 20)}
                    <div>
                      <h2>Resultados de vision</h2>
                      <p>${escapeHtml(modeText)}</p>
                    </div>
                  </div>
                  ${error ? `<div class="error-box">${icon("alert")}<p>${escapeHtml(error)}</p></div>` : ""}
                  <div class="result-grid">
                    ${resultCard("spark", "Caption", summary.caption || "Sin caption todavia.")}
                    ${resultCard("tags", "Tags", (summary.tags || []).join(", ") || "Sin etiquetas.")}
                    ${resultCard("boxes", "Objetos", (summary.objects || []).join(", ") || "Sin objetos detectados.")}
                    ${resultCard("users", "Personas", result ? String(summary.people) : "-")}
                  </div>
                  ${detailSection("Dense captions", summary.denseCaptions || [], "Sin captions detallados.")}
                  ${detailSection("OCR", summary.readLines || [], "Sin texto detectado.", "type")}
                  ${result ? `<details class="raw-box"><summary>Ver respuesta JSON</summary><pre>${escapeHtml(raw)}</pre></details>` : ""}
                </section>
              </section>
            </section>
          </main>
        `;

        document.getElementById("image-input").addEventListener("change", onFileChange);
        document.querySelectorAll("[data-feature]").forEach((button) => {
          button.addEventListener("click", () => {
            const feature = button.dataset.feature;
            if (selectedFeatures.includes(feature)) {
              if (selectedFeatures.length > 1) {
                selectedFeatures = selectedFeatures.filter((item) => item !== feature);
              }
            } else {
              selectedFeatures = [...selectedFeatures, feature];
            }
            render();
          });
        });
        document.getElementById("vision-form").addEventListener("submit", onAnalyze);
        setFrameHeight();
      }

      function onFileChange(event) {
        const file = event.target.files?.[0];
        if (!file) return;
        currentFile = file;
        isAnalyzing = false;
        const reader = new FileReader();
        reader.onload = () => {
          currentDataUrl = String(reader.result || "");
          render();
        };
        reader.readAsDataURL(file);
      }

      function onAnalyze(event) {
        event.preventDefault();
        if (!currentDataUrl || isAnalyzing) return;
        isAnalyzing = true;
        render();
        setComponentValue({
          action: "analyze",
          fileName: currentFile?.name || args.fileName || "",
          contentType: currentFile?.type || args.contentType || "",
          dataUrl: currentDataUrl,
          features: selectedFeatures
        });
      }

      window.addEventListener("message", (event) => {
        if (event.data.type !== "streamlit:render") return;
        args = event.data.args || {};
        if (args.result || args.error) {
          isAnalyzing = false;
        }
        render();
      });

      window.addEventListener("resize", setFrameHeight);
      sendMessage("streamlit:componentReady", { apiVersion: 1 });
      setFrameHeight();
    </script>
  </body>
</html>
